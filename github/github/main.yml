name: Flight Check Agent
on:
  schedule:
    - cron: '0 * * * *' # ירוץ כל שעה עגולה
  workflow_dispatch: # מאפשר לך להריץ ידנית מה-GitHub Actions כדי לבדוק שזה עובד
jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: node index.js
