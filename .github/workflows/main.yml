name: Flight Check Agent
on:
  schedule:
    - cron: '0 * * * *' # ירוץ כל שעה עגולה
  workflow_dispatch: # מאפשר לך להריץ ידנית לבדיקה
jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # עודכן מ-v3 ל-v4
      - uses: actions/setup-node@v4 # עודכן מ-v3 ל-v4
        with:
          node-version: 24 # שדרגנו גם את גרסת ה-Node ל-24
      - run: npm install
      - run: node index.js
